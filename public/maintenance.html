<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>We’ll be back soon</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg,#0f172a,#1e293b,#020617);
  color:#fff;
}

.container {
  text-align:center;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.05);
  padding:40px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(0,0,0,0.5);
  max-width:500px;
}

h1 {
  font-size:38px;
  margin-bottom:10px;
}

p {
  opacity:0.7;
  margin-bottom:25px;
}

.loader {
  width:50px;
  height:50px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,0.1);
  border-top:4px solid #38bdf8;
  animation:spin 1s linear infinite;
  margin:auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.footer {
  margin-top:20px;
  font-size:14px;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="container">
  <h1>🚧 We’re Improving Things By Anshul GOle 🚧</h1>
  <p>Our website is currently under maintenance.  
  We’ll be back very soon.</p>

  <div class="loader"></div>

  <div class="footer">
    © 2026 AG-Developer  
  </div>
</div>

</body>
</html>
